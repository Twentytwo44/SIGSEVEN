name: SIGSEVEN Options Engine CI/CD (Vercel & Render)

on:
  push:
    branches: [ "master" ]

jobs:
 
  # ----------------------------------------------------
  # JOB 1: ส่งโค้ดหน้าบ้านไปบิวด์และกระจายสายบน Vercel (Official CLI)
  # ----------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ด่านที่ 1: ติดตั้ง Vercel CLI เวอร์ชันใหม่ล่าสุดของแท้
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # ด่านที่ 2: สั่งยิงโค้ดขึ้นโปรดักชัน
      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  # ----------------------------------------------------
  # JOB 2: แพ็กหลังบ้านเป็น Docker ขึ้น Hub และยิงไปที่ Render.com
  # ----------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ด่านที่ 1: ล็อกอินเข้าคลังเก็บ Docker Image ของคุณ
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ด่านที่ 2: ประกอบร่างและดันไฟล์ Docker Image ขึ้น Cloud Registry
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./sigseven-backend # 🔥 แก้เป็นชื่อโฟลเดอร์จริง
          file: ./sigseven-backend/Dockerfile # 🔥 แก้เป็นชื่อโฟลเดอร์จริง
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/options-backend:latest

      # ด่านที่ 3: สะกิด Render.com ให้ดึง Docker ตัวใหม่ล่าสุดไปรันทันที
      - name: Trigger Render Deployment via Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"